<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BingeBuddy | Welcome</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="welcome-screen">
    <video autoplay muted loop id="bgVideo">
      <source src="bg.mp4" type="video/mp4" />
    </video>

    <div class="video-overlay"></div>

    <div class="welcome-content">
      <button class="welcome-btn" onclick="window.location.href = 'login.html'">
        Get Started
      </button>
    </div>
    <script>
      const token = localStorage.getItem("access_token");
      const expiry = localStorage.getItem("access_token_expires_at");
      const expired = expiry ? Date.now() > Number(expiry) : false;

      if (token && !expired) {
        window.location.href = "home.html";
      } else if (expired) {
        localStorage.removeItem("access_token");
        localStorage.removeItem("access_token_expires_at");
      }
    </script>
  </body>
</html>
