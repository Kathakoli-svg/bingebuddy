<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BingeBuddy — Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" />
  </head>

  <body class="auth-screen">
    <div class="auth-card">
      <a href="index.html" class="auth-brand">
        <div class="auth-brand-icon">
          <img src="favicon.ico" alt="BingeBuddy icon" />
        </div>
        <span class="auth-brand-name">BingeBuddy</span>
      </a>

      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to continue</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>

    <div class="filmstrip"></div>

    <script src="js/auth.js"></script>
    <script>
      async function handleLogin() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("errorMsg");

        errorMsg.style.display = "none";

        if (!email || !password) {
          errorMsg.textContent = "Please fill in all fields";
          errorMsg.style.display = "block";
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in...";

        const result = await loginUser(email, password);

        if (result.success) {
          window.location.href = "home.html";
        } else {
          errorMsg.textContent = result.error || "Login failed";
          errorMsg.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
